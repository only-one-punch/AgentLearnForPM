name: Deploy Agent PM Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: agent-pm-blog-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build application
        env:
          NEXT_PUBLIC_BASE_PATH: /agent-pm
        run: npm run build

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'

    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/agent-pm-blog' }}
      DEPLOY_BRANCH: main
      ENV_FILE: .env.production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run server deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REPO_URL: git@github.com:${{ github.repository }}.git
        run: |
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPO_URL='$REPO_URL' BRANCH='$DEPLOY_BRANCH' ENV_FILE='$ENV_FILE' bash -s" \
            < scripts/server-deploy.sh
