name: Deploy Agent PM Blog

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: agent-pm-blog-production
  cancel-in-progress: false

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build content artifacts
        run: npm run content:build

      - name: Run tests
        run: npm test

      - name: Build application
        env:
          NEXT_PUBLIC_BASE_PATH: /agent-pm
        run: npm run build

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'

    env:
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH || '/opt/agent-pm-blog' }}
      DEPLOY_BRANCH: main
      ENV_FILE: .env.production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Run server deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REPO_URL: git@github.com:${{ github.repository }}.git
        run: |
          deploy_id="github-${{ github.run_id }}"

          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' REPO_URL='$REPO_URL' BRANCH='$DEPLOY_BRANCH' ENV_FILE='$ENV_FILE' DEPLOY_ID='$deploy_id' bash -s" <<'REMOTE'
          set -Eeuo pipefail

          parent_dir="$(dirname "$DEPLOY_PATH")"
          mkdir -p "$parent_dir"

          if [ ! -d "$DEPLOY_PATH/.git" ]; then
            git clone --branch "$BRANCH" "$REPO_URL" "$DEPLOY_PATH"
          fi

          cd "$DEPLOY_PATH"
          git fetch origin "$BRANCH"
          git checkout "$BRANCH"
          git pull --ff-only origin "$BRANCH"

          bash scripts/server-deploy-async.sh
          REMOTE

          status_file="$DEPLOY_PATH/.deploy-logs/$deploy_id.status"
          log_file="$DEPLOY_PATH/.deploy-logs/$deploy_id.log"

          for attempt in {1..90}; do
            status="$(ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "cat '$status_file' 2>/dev/null || echo missing")"
            echo "Deploy status: $status (attempt $attempt/90)"

            if [ "$status" = "success" ]; then
              ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "tail -n 80 '$log_file'"
              exit 0
            fi

            if [ "$status" = "failure" ]; then
              ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "tail -n 160 '$log_file'"
              exit 1
            fi

            if [ "$attempt" -eq 90 ]; then
              echo "Deploy did not finish in time."
              ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "tail -n 160 '$log_file' || true"
              exit 1
            fi

            if [ $((attempt % 6)) -eq 0 ]; then
              ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" "tail -n 40 '$log_file' || true"
            fi

            sleep 20
          done
